# Configuração do banco de dados
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gastos_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:161105}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Porta da aplicação (opcional, padrão já é 8080)
server.port=8080

jwt.secret=${JWT_SECRET:chave-temporaria-apenas-para-desenvolvimento-local-trocar-em-producao}

logging.level.org.springframework.security=DEBUG